<svg viewBox="0 0 820 420" xmlns="http://www.w3.org/2000/svg" font-family="'Georgia', serif">
  <defs>
    <marker id="aBlue" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#185FA5"/>
    </marker>
    <marker id="aGreen" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#0F6E56"/>
    </marker>
    <marker id="aRed" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#C0392B"/>
    </marker>
    <marker id="aPurple" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#534AB7"/>
    </marker>
  </defs>
  <rect width="820" height="420" fill="#FAFAF8" rx="14"/>
  <text x="410" y="32" text-anchor="middle" font-size="15" font-weight="bold" fill="#2C2C2A" letter-spacing="0.5">W4A8 QUANTIZATION ENGINE — HARDWARE CALIBRATION PIPELINE</text>
  <text x="410" y="50" text-anchor="middle" font-size="11" fill="#888780">4-bit weights × 8-bit activations · hardware-assisted dynamic recalibration</text>

  <!-- LEFT: Why W4A8 -->
  <rect x="20" y="68" width="200" height="322" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="1.2"/>
  <text x="120" y="88" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C2C2A">Precision tradeoffs</text>
  <line x1="30" y1="96" x2="210" y2="96" stroke="#D3D1C7" stroke-width="0.8"/>

  <!-- table rows -->
  <rect x="28" y="104" width="184" height="24" rx="3" fill="#EAF3DE" stroke="#97C459"/>
  <text x="56" y="117" font-size="9" fill="#27500A" font-weight="bold">FP16</text>
  <text x="140" y="117" text-anchor="middle" font-size="9" fill="#27500A">0% accuracy loss</text>
  <text x="56" y="131" font-size="8" fill="#3B6D11">140 GB model · 1× BW</text>

  <rect x="28" y="136" width="184" height="24" rx="3" fill="#EAF3DE" stroke="#97C459"/>
  <text x="56" y="149" font-size="9" fill="#27500A" font-weight="bold">W8A8</text>
  <text x="140" y="149" text-anchor="middle" font-size="9" fill="#27500A">–0.5% avg loss</text>
  <text x="56" y="163" font-size="8" fill="#3B6D11">70 GB model · 2× BW gain</text>

  <rect x="28" y="168" width="184" height="24" rx="3" fill="#1D9E75" stroke="#085041"/>
  <text x="56" y="181" font-size="9" fill="white" font-weight="bold">W4A8 ← CortexChip</text>
  <text x="56" y="195" font-size="8" fill="#9FE1CB">35 GB model · 4× BW gain</text>

  <rect x="28" y="200" width="184" height="24" rx="3" fill="#FCEBEB" stroke="#E24B4A"/>
  <text x="56" y="213" font-size="9" fill="#791F1F" font-weight="bold">W4A4</text>
  <text x="140" y="213" text-anchor="middle" font-size="9" fill="#791F1F">–4 to –8%</text>
  <text x="56" y="227" font-size="8" fill="#A32D2D">Accuracy unacceptable</text>

  <!-- BW math box -->
  <rect x="28" y="238" width="184" height="86" rx="5" fill="#E6F1FB" stroke="#378ADD"/>
  <text x="120" y="254" text-anchor="middle" font-size="9" fill="#0C447C" font-weight="bold">Why W4A8 closes the BW gap</text>
  <text x="36" y="268" font-size="8" fill="#185FA5">H100 FP16: 3.35 TB/s needed</text>
  <text x="36" y="280" font-size="8" fill="#185FA5">CortexChip W4A8:</text>
  <text x="36" y="292" font-size="8" fill="#185FA5">  70B × 0.5 bytes = 35 GB weights</text>
  <text x="36" y="304" font-size="8" fill="#185FA5">  Effective BW need: ~700 GB/s</text>
  <text x="36" y="316" font-size="8" fill="#185FA5">  GDDR7 delivers: ~1.5 TB/s eff.</text>
  <text x="120" y="330" text-anchor="middle" font-size="9" fill="#0C447C" font-weight="bold">Margin: 2.1× headroom</text>

  <!-- MIDDLE: Quantization pipeline -->
  <rect x="240" y="68" width="320" height="322" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5"/>
  <text x="400" y="88" text-anchor="middle" font-size="11" font-weight="bold" fill="#3C3489">Quantization Engine — TCA Integration</text>
  <line x1="250" y1="96" x2="550" y2="96" stroke="#AFA9EC" stroke-width="0.8"/>

  <!-- Input weights -->
  <rect x="260" y="106" width="280" height="32" rx="5" fill="#CECBF6" stroke="#7F77DD"/>
  <text x="400" y="122" text-anchor="middle" font-size="9" fill="#26215C" font-weight="bold">FP16/BF16 model weights (offline)</text>
  <text x="400" y="136" text-anchor="middle" font-size="8" fill="#534AB7">Loaded once at model initialization</text>

  <line x1="400" y1="138" x2="400" y2="154" stroke="#534AB7" stroke-width="1.2" marker-end="url(#aPurple)"/>

  <!-- GPTQ/AWQ box -->
  <rect x="260" y="154" width="130" height="44" rx="5" fill="#AFA9EC" stroke="#7F77DD"/>
  <text x="325" y="172" text-anchor="middle" font-size="9" fill="#26215C" font-weight="bold">SW Quantization</text>
  <text x="325" y="185" text-anchor="middle" font-size="8" fill="#3C3489">GPTQ / AWQ offline</text>

  <!-- CortexChip HW calib box -->
  <rect x="410" y="154" width="130" height="44" rx="5" fill="#1D9E75" stroke="#085041"/>
  <text x="475" y="172" text-anchor="middle" font-size="9" fill="white" font-weight="bold">HW Calib. Assist</text>
  <text x="475" y="185" text-anchor="middle" font-size="8" fill="#9FE1CB">Online recalibration</text>

  <line x1="325" y1="198" x2="370" y2="218" stroke="#534AB7" stroke-width="1.2" marker-end="url(#aPurple)"/>
  <line x1="475" y1="198" x2="430" y2="218" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#aGreen)"/>

  <!-- MAC unit -->
  <rect x="310" y="218" width="180" height="60" rx="6" fill="#7F77DD" stroke="#3C3489" stroke-width="1.5"/>
  <text x="400" y="238" text-anchor="middle" font-size="10" fill="white" font-weight="bold">Systolic MAC Unit</text>
  <text x="400" y="252" text-anchor="middle" font-size="9" fill="#CECBF6">INT4 weight × INT8 activation</text>
  <text x="400" y="265" text-anchor="middle" font-size="9" fill="#CECBF6">→ 32-bit accumulator</text>

  <line x1="400" y1="278" x2="400" y2="294" stroke="#534AB7" stroke-width="1.2" marker-end="url(#aPurple)"/>

  <!-- Output -->
  <rect x="310" y="294" width="180" height="32" rx="5" fill="#CECBF6" stroke="#7F77DD"/>
  <text x="400" y="310" text-anchor="middle" font-size="9" fill="#26215C" font-weight="bold">FP32 Accumulation</text>
  <text x="400" y="322" text-anchor="middle" font-size="8" fill="#534AB7">Dequantized output activations</text>

  <line x1="400" y1="326" x2="400" y2="342" stroke="#534AB7" stroke-width="1.2" marker-end="url(#aPurple)"/>

  <!-- Stats registers feedback loop -->
  <rect x="260" y="342" width="280" height="38" rx="5" fill="#9FE1CB" stroke="#1D9E75" stroke-width="1.2"/>
  <text x="400" y="358" text-anchor="middle" font-size="9" fill="#04342C" font-weight="bold">Calibration Assist Registers (per layer)</text>
  <text x="400" y="372" text-anchor="middle" font-size="8" fill="#085041">Track: min / max / mean / variance / kurtosis of activations</text>

  <!-- feedback arrow back to HW calib -->
  <path d="M540 361 L570 361 L570 176 L542 176" fill="none" stroke="#0F6E56" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#aGreen)"/>
  <text x="574" y="280" font-size="8" fill="#0F6E56" transform="rotate(90,574,280)">live feedback loop</text>

  <!-- RIGHT: Accuracy benchmarks -->
  <rect x="580" y="68" width="220" height="322" rx="8" fill="#F3FCF7" stroke="#5DCAA5" stroke-width="1.5"/>
  <text x="690" y="88" text-anchor="middle" font-size="11" font-weight="bold" fill="#085041">Accuracy benchmarks</text>
  <text x="690" y="102" text-anchor="middle" font-size="9" fill="#0F6E56">LLaMA-3 70B family</text>
  <line x1="590" y1="110" x2="790" y2="110" stroke="#5DCAA5" stroke-width="0.8"/>

  <!-- MMLU -->
  <text x="594" y="128" font-size="9" fill="#085041" font-weight="bold">MMLU (5-shot)</text>
  <rect x="590" y="132" width="164" height="12" rx="3" fill="#D3D1C7"/>
  <rect x="590" y="132" width="164" height="12" rx="3" fill="#1D9E75"/>
  <text x="760" y="143" font-size="9" fill="#085041">82.0%</text>
  <text x="594" y="156" font-size="8.5" fill="#0F6E56">FP16: 82.0% → SW W4A8: 79.8% → HW W4A8: 80.6%</text>
  <rect x="590" y="160" width="130" height="10" rx="2" fill="#9FE1CB"/>
  <text x="726" y="169" font-size="8" fill="#0F6E56" font-weight="bold">–1.4%</text>

  <!-- HumanEval -->
  <text x="594" y="186" font-size="9" fill="#085041" font-weight="bold">HumanEval (pass@1)</text>
  <rect x="590" y="190" width="140" height="12" rx="3" fill="#D3D1C7"/>
  <rect x="590" y="190" width="140" height="12" rx="3" fill="#1D9E75"/>
  <text x="736" y="201" font-size="9" fill="#085041">72.6%</text>
  <text x="594" y="214" font-size="8.5" fill="#0F6E56">FP16: 72.6% → SW: 69.9% → HW: 70.8%</text>
  <rect x="590" y="218" width="130" height="10" rx="2" fill="#9FE1CB"/>
  <text x="726" y="227" font-size="8" fill="#0F6E56" font-weight="bold">–1.8%</text>

  <!-- GSM8K -->
  <text x="594" y="244" font-size="9" fill="#085041" font-weight="bold">GSM8K (8-shot CoT)</text>
  <rect x="590" y="248" width="156" height="12" rx="3" fill="#D3D1C7"/>
  <rect x="590" y="248" width="156" height="12" rx="3" fill="#1D9E75"/>
  <text x="752" y="259" font-size="9" fill="#085041">91.2%</text>
  <text x="594" y="272" font-size="8.5" fill="#0F6E56">FP16: 91.2% → SW: 88.4% → HW: 89.7%</text>
  <rect x="590" y="276" width="130" height="10" rx="2" fill="#9FE1CB"/>
  <text x="726" y="285" font-size="8" fill="#0F6E56" font-weight="bold">–1.5%</text>

  <!-- Recovery badge -->
  <rect x="590" y="302" width="200" height="44" rx="5" fill="#085041"/>
  <text x="690" y="320" text-anchor="middle" font-size="9" fill="white" font-weight="bold">HW calibration assist recovers</text>
  <text x="690" y="336" text-anchor="middle" font-size="14" fill="#9FE1CB" font-weight="bold">+0.3 – 0.5 pp</text>
  <text x="690" y="351" text-anchor="middle" font-size="9" fill="#9FE1CB">vs software-only W4A8</text>

  <!-- Enterprise threshold note -->
  <rect x="590" y="354" width="200" height="30" rx="4" fill="#E1F5EE" stroke="#1D9E75"/>
  <text x="690" y="366" text-anchor="middle" font-size="8.5" fill="#085041" font-weight="bold">Enterprise threshold: ≤2% delta</text>
  <text x="690" y="378" text-anchor="middle" font-size="8" fill="#0F6E56">Financial/Legal: ✓ within threshold</text>

  <!-- Bottom summary -->
  <rect x="20" y="400" width="780" height="16" rx="4" fill="#3C3489"/>
  <text x="410" y="412" text-anchor="middle" font-size="9" fill="white" font-weight="bold">Hardware calibration adds ~2% area overhead and &lt;0.5% latency per layer — recovers 0.3–0.5pp accuracy vs static quantization</text>
</svg>
